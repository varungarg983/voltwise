<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#smallGrid)"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(121,215,255,0.12)" stroke-width="1.4"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#grid)"/>
</svg>